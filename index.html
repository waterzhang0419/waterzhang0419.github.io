<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fbfbfd;
            color: #1d1d1f;
            scroll-behavior: smooth;
        }

        .apple-blur {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        .hero-gradient {
            background: linear-gradient(180deg, #ffffff 0%, #fbfbfd 100%);
        }

        .section-title {
            font-size: 2.25rem;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 2.5rem;
            color: #1d1d1f;
        }

        .card-shadow {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card-shadow:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .project-img-container {
            cursor: zoom-in;
            overflow: hidden;
            border-radius: 16px;
        }

        .project-img {
            aspect-ratio: 16 / 10;
            object-fit: cover;
            background: #f5f5f7;
            transition: transform 0.5s ease;
        }
		
        /* 统一头像显示逻辑 */
        .avatar-container {
            width: 10rem; /* 160px */
            height: 10rem;
            border-radius: 9999px;
            overflow: hidden;
            background-color: #ffffff; /* 确保背景是白的 */
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        @media (min-width: 768px) {
            .avatar-container {
                width: 14rem; /* 224px */
                height: 14rem;
            }
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 关键：裁剪并填充 */
            object-position: 50% 30%; /* 针对你上传的照片微调，让头部更靠中 */
        }

        .project-img-container:hover .project-img {
            transform: scale(1.03);
        }

        .nav-link {
            transition: color 0.3s ease;
            color: #515154;
        }

        .nav-link:hover {
            color: #0066cc;
        }

        .list-dot {
            position: relative;
            padding-left: 1.5rem;
        }
        .list-dot::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #86868b;
        }

        /* 原图预览遮罩 */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <center style="margin-top: 300px;">
        <h1 class="text-4xl font-bold">This page is currently not available.</h1>
    </center>

</body>
</html>
